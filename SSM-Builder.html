<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSM Builder</title>
<style>
:root{
  --bg:#eceef0; --bg-grid:#e3e6e9;
  --surface:#ffffff; --surface-2:#f6f7f9; --surface-3:#f0f2f4;
  --border:#e2e6ea; --border-strong:#d3d8de;
  --ink:#1a1c20; --ink-2:#585e66; --ink-3:#959ba3;
  --panel:#222428; --panel-2:#2c2f34; --panel-line:#3a3e44;
  --accent:#ea580c; --accent-700:#c2410c; --accent-500:#f97316; --accent-400:#fb923c;
  --accent-300:#fdba74; --accent-200:#fed7aa; --accent-100:#ffedd5; --accent-600:#ea580c; --tint:#fff5ee; --tint-2:#ffe9d6;
  --trace:#f0a45e;
  --ok:#16794a; --ok-bg:#e7f4ec; --warn:#a85a13; --warn-bg:#fdf1e3; --danger:#cc3b30;
  --radius:16px; --radius-md:11px; --radius-sm:8px;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,system-ui,sans-serif;
  --shadow-sm:0 1px 2px rgba(18,20,24,.05);
  --shadow:0 1px 2px rgba(18,20,24,.04),0 10px 28px -12px rgba(18,20,24,.18);
  --shadow-lg:0 24px 60px -22px rgba(18,20,24,.32);
  --ring:0 0 0 3px rgba(234,88,12,.26);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);
  background-image:linear-gradient(var(--bg-grid) 1px,transparent 1px),linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px);
  background-size:26px 26px;background-position:-1px -1px;-webkit-font-smoothing:antialiased;line-height:1.45}
.ic{width:18px;height:18px;display:inline-block;flex:0 0 auto;vertical-align:middle}
button{font-family:inherit}
mark{background:var(--accent-200);color:var(--accent-700);border-radius:3px;padding:0 1px}

.topbar{position:sticky;top:0;z-index:30;background:var(--panel);color:#fff;
  box-shadow:0 1px 0 var(--panel-line),0 6px 22px -14px rgba(0,0,0,.6)}
.topbar::after{content:"";display:block;height:3px;background:repeating-linear-gradient(90deg,var(--accent) 0 26px,var(--panel-2) 26px 30px)}
.topbar-in{max-width:1080px;margin:0 auto;padding:4px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .mark{order:1}
.brand>div:last-child{order:2;min-width:0}
.mark{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--accent-500),var(--accent-700));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 4px 12px -4px rgba(234,88,12,.7)}
.mark .ic{width:20px;height:20px;color:#fff}
.lotus-logo{order:0;height:66px;width:auto;max-width:219px;object-fit:contain;display:block}
.brand h1{font-size:16.5px;margin:0;letter-spacing:-.2px;font-weight:650;white-space:nowrap}
.brand .tag{display:block;font-size:11px;color:#aeb4bd;font-family:var(--mono);letter-spacing:.3px;margin-top:1px}
.steps{margin-left:auto;display:flex;align-items:center;gap:6px}
.step{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:99px;font-size:12.5px;
  color:#9aa0a8;border:1px solid transparent;white-space:nowrap}
.step .num{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;
  background:var(--panel-2);color:#aeb4bd;font-family:var(--mono)}
.step .num .ic{width:11px;height:11px}
.step.active{color:#fff;background:rgba(234,88,12,.16);border-color:rgba(234,88,12,.45)}
.step.active .num{background:var(--accent);color:#fff}
.step.done{color:#cfd4da}
.step.done .num{background:#33493d;color:#7fd6a3}
.step-sep{width:14px;height:1px;background:var(--panel-line)}

#view{max-width:1080px;margin:0 auto;padding:30px 22px 64px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.pad{padding:26px}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-700);font-weight:600}
.lead{font-size:22px;font-weight:640;letter-spacing:-.4px;margin:8px 0 4px}
.sub{color:var(--ink-2);font-size:14px;margin:0}
.sub b{color:var(--ink);font-weight:620}

.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border-strong);background:var(--surface);
  color:var(--ink);padding:10px 15px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:550;cursor:pointer;
  transition:.14s ease;box-shadow:var(--shadow-sm)}
.btn .ic{width:16px;height:16px}
.btn:hover{border-color:var(--ink-3);background:var(--surface-2)}
.btn:focus-visible{outline:none;box-shadow:var(--ring)}
.btn.primary{background:linear-gradient(170deg,var(--accent-500),var(--accent));border-color:var(--accent-700);
  color:#fff;box-shadow:0 6px 16px -8px rgba(234,88,12,.8)}
.btn.primary:hover{filter:brightness(1.04)}
.btn.primary:disabled{background:var(--surface-3);color:var(--ink-3);border-color:var(--border);box-shadow:none;cursor:not-allowed;filter:none}
.btn.ghost{background:transparent;box-shadow:none;border-color:transparent;color:var(--ink-2)}
.btn.ghost:hover{background:var(--surface-3);border-color:var(--border)}
.btn.sm{padding:7px 11px;font-size:12.5px}
.btn-link{background:none;border:none;color:var(--accent-700);font-weight:600;cursor:pointer;padding:0;font-size:inherit;text-decoration:underline;text-underline-offset:2px}
.btn-link:focus-visible{outline:none;box-shadow:var(--ring);border-radius:4px}

.dz{border:2px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--surface-2);
  padding:46px 24px;text-align:center;cursor:pointer;transition:.16s ease;position:relative}
.dz:hover{border-color:var(--accent-400);background:var(--tint)}
.dz:focus-visible{outline:none;box-shadow:var(--ring);border-color:var(--accent-400)}
.dz.drag{border-color:var(--accent);background:var(--tint-2);transform:scale(.996)}
.dz .dzicon{width:54px;height:54px;border-radius:14px;margin:0 auto 14px;display:grid;place-items:center;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);color:var(--accent)}
.dz .dzicon .ic{width:26px;height:26px}
.dz h2{margin:0 0 4px;font-size:17px;font-weight:620;letter-spacing:-.2px}
.dz p{margin:0;color:var(--ink-2);font-size:13.5px}
.dz .fmt{margin-top:14px;display:inline-flex;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.dz .fmt span{background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:5px}

#filelist{margin-top:18px;display:flex;flex-direction:column;gap:9px}
.frow{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);transition:.12s}
.frow:hover{border-color:var(--border-strong)}
.frow.err{border-color:var(--warn);background:var(--warn-bg)}
.ficon{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;background:var(--tint);color:var(--accent-700);border:1px solid var(--accent-200)}
.ficon.csv{background:#eef3fb;color:#2f5fa8;border-color:#d6e3f5}
.fmeta{min-width:0;flex:1}
.fname{font-weight:560;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsub{font-size:12px;color:var(--ink-2);font-family:var(--mono);margin-top:2px}
.fsub.warn{color:var(--warn)}
.xbtn{margin-left:auto;width:30px;height:30px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--ink-3);display:grid;place-items:center;cursor:pointer;flex:0 0 auto}
.xbtn:hover{background:#fdecea;color:var(--danger);border-color:#f6d4d0}
.xbtn:focus-visible{outline:none;box-shadow:var(--ring)}

.actions{display:flex;align-items:center;gap:12px;margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
.actions .spacer{margin-left:auto}
.hint{font-size:12.5px;color:var(--ink-3);font-family:var(--mono)}

.card-head{display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid var(--border)}
.card-head .ttl{font-weight:600;font-size:15px;display:flex;align-items:center;gap:9px}
.card-head .ttl .ic{color:var(--accent)}
.card-head .spacer{margin-left:auto}
.card-body{padding:18px 22px}
.grp{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;background:var(--surface)}
.grp:last-child{margin-bottom:0}
.grp-h{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--surface-3);border-bottom:1px solid var(--border)}
.grp-h .ficon{width:30px;height:30px;border-radius:7px}
.grp-h .ficon .ic{width:16px;height:16px}
.grp-h .gname{font-weight:560;font-size:13.5px}
.grp-h .gcount{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
.srow{display:flex;align-items:center;gap:13px;padding:12px 14px;border-bottom:1px solid var(--border);transition:.12s;cursor:pointer}
.srow:last-of-type{border-bottom:none}
.srow:hover{background:var(--surface-2)}
.srow.on{background:var(--tint)}
.chk{position:relative;flex:0 0 auto;display:grid;place-items:center}
.chk input{position:absolute;opacity:0;width:0;height:0}
.box{width:20px;height:20px;border-radius:6px;border:1.6px solid var(--border-strong);background:var(--surface);display:grid;place-items:center;color:#fff;transition:.12s}
.box .ic{width:14px;height:14px;opacity:0;transform:scale(.6);transition:.12s}
.chk input:checked + .box{background:var(--accent);border-color:var(--accent-700)}
.chk input:checked + .box .ic{opacity:1;transform:scale(1)}
.chk input:focus-visible + .box{box-shadow:var(--ring)}
.sinfo{min-width:0;flex:1}
.sname{display:flex;align-items:center;gap:8px;font-weight:550;font-size:13.5px}
.sname .ic{width:15px;height:15px;color:var(--ink-3)}
.srows{font-family:var(--mono);font-size:11px;color:var(--ink-3);font-weight:400}
.sdet{font-size:12px;color:var(--ink-2);margin-top:3px;font-family:var(--mono);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sdet b{color:var(--ink);font-weight:600}
.pill{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.2px}
.pill .ic{width:11px;height:11px}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.editcols{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);background:var(--surface);border:1px solid var(--border-strong);border-radius:7px;padding:6px 9px;cursor:pointer}
.editcols:hover{border-color:var(--ink-3);background:var(--surface-2)}
.editcols .ic{width:14px;height:14px}
.editpanel{padding:14px;background:var(--surface-2);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-family:var(--mono);letter-spacing:.4px;text-transform:uppercase;color:var(--ink-3)}
.fld select{font-family:var(--sans);font-size:13px;padding:8px 10px;border:1px solid var(--border-strong);border-radius:7px;background:var(--surface);color:var(--ink)}
.fld select:focus-visible{outline:none;box-shadow:var(--ring);border-color:var(--accent-400)}
.editnote{grid-column:1/-1;font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:7px;font-family:var(--mono)}
.editnote .ic{width:14px;height:14px;color:var(--ink-3)}

.statwrap{display:grid;grid-template-rows:1fr;opacity:1;margin-bottom:16px;transition:grid-template-rows .34s cubic-bezier(.22,1,.36,1),opacity .24s ease,margin-bottom .34s cubic-bezier(.22,1,.36,1)}
.statwrap.collapsed{grid-template-rows:0fr;opacity:0;margin-bottom:0}
.statwrap>.statbar{overflow:hidden;min-height:0}
.statbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));gap:11px}
.statstoggle{margin-left:auto;align-self:center;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);background:var(--surface);color:var(--ink-2);font:inherit;font-size:12.5px;font-weight:600;border-radius:8px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
.statstoggle .ic{width:15px;height:15px;color:var(--ink-3)}
.statstoggle:hover{background:var(--surface-2);color:var(--ink);border-color:var(--accent-300)}
.statstoggle:hover .ic{color:var(--accent-600)}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.stat .sl{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);font-family:var(--mono);letter-spacing:.3px;text-transform:uppercase}
.stat .sl .ic{width:14px;height:14px;color:var(--accent)}
.stat .sv{font-size:25px;font-weight:680;letter-spacing:-.6px;margin-top:6px;font-family:var(--mono)}
.stat.muted::before{background:var(--ink-3)}
.stat.muted .sl .ic{color:var(--ink-3)}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:13px;flex-wrap:wrap}
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:0 11px;height:40px;min-width:240px;flex:1;max-width:400px;box-shadow:var(--shadow-sm)}
.search:focus-within{border-color:var(--accent-400);box-shadow:var(--ring)}
.search .ic{width:17px;height:17px;color:var(--ink-3)}
.search input{border:none;outline:none;background:none;flex:1;font-size:14px;font-family:var(--mono);color:var(--ink);min-width:0}
.search .qx{width:22px;height:22px;border-radius:6px;border:none;background:var(--surface-3);color:var(--ink-2);display:none;place-items:center;cursor:pointer}
.search .qx.show{display:grid}
.search .qx .ic{width:13px;height:13px}
.chip{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 12px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-2);font-size:12.5px;font-weight:550;cursor:pointer;box-shadow:var(--shadow-sm);white-space:nowrap}
.chip .ic{width:14px;height:14px}
.chip:hover{border-color:var(--ink-3)}
.chip.on{background:var(--tint);border-color:var(--accent);color:var(--accent-700)}
.chip:focus-visible{outline:none;box-shadow:var(--ring)}
.tools{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.toolbar > .exp{margin-left:auto}
.exp{display:flex;align-items:center;gap:6px;padding-left:10px;margin-left:2px;border-left:1px solid var(--border)}
.exp .lab{font-size:11px;color:var(--ink-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.4px}
/* dependency badge + detail button on tree rows */
.dep{align-self:center;display:inline-flex;align-items:center;gap:4px;margin-left:8px;font-size:11px;font-family:var(--mono);font-weight:600;color:var(--accent-700);background:var(--tint);border:1px solid var(--accent-200);padding:1px 8px 1px 6px;border-radius:99px;white-space:nowrap}
.dep .ic{width:12px;height:12px;color:var(--accent-500)}
.rowinfo{align-self:center;margin-left:auto;flex:0 0 auto;width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--ink-3);display:grid;place-items:center;cursor:pointer;opacity:0;transition:opacity .12s ease,border-color .12s ease}
.rowinfo .ic{width:14px;height:14px}
.row:hover .rowinfo,.row:focus-within .rowinfo,.rowinfo:focus-visible{opacity:1}
.rowinfo:hover{border-color:var(--accent-400);color:var(--accent-700);background:var(--tint)}
.hide-deps .dep:not(.pmd-link){display:none}
.hide-pmd .pmd-link{display:none}
.row.is-spare .lbl,.row.is-space .lbl{color:var(--ink-3);font-style:italic}
.row.is-spare .marker.leaf .ic,.row.is-space .marker.leaf .ic{color:var(--ink-3)}
#qinfo{font-size:12.5px;color:var(--ink-2);font-family:var(--mono);margin:-4px 0 11px;min-height:16px}
#qinfo b{color:var(--accent-700)}

.treecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;max-height:60vh;overflow:auto}
.treecard::-webkit-scrollbar{width:11px;height:11px}
.treecard::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px;border:3px solid var(--surface)}
#tree{font-family:var(--mono);font-size:13.5px}
.kids[hidden]{display:none}
.row{display:flex;align-items:stretch;min-height:30px;border-radius:7px;user-select:none;position:relative}
.row[data-exp]{cursor:pointer}
.row.leafrow{cursor:copy}
.row:hover{background:var(--surface-2)}
.row:focus-visible{outline:none;box-shadow:var(--ring);z-index:1}
.gut{display:flex;align-items:stretch;flex:0 0 auto}
.g{position:relative;width:22px;flex:0 0 22px;align-self:stretch}
.g-v::before,.g-t::before,.g-l::before{content:"";position:absolute;left:10px;width:2px;background:var(--trace)}
.g-v::before{top:0;bottom:0}
.g-t::before{top:0;bottom:0}
.g-l::before{top:0;height:15px}
.g-t::after,.g-l::after{content:"";position:absolute;left:10px;top:15px;height:2px;width:12px;background:var(--trace);transform:translateY(-1px)}
.twist{width:22px;flex:0 0 auto;display:grid;place-items:center;color:var(--ink-3);align-self:center}
.twist .ic{width:15px;height:15px;transition:transform .15s ease}
.row.open > .twist .ic{transform:rotate(90deg)}
.marker{width:22px;flex:0 0 auto;display:grid;place-items:center;align-self:center}
.marker.branch::before{content:"";width:9px;height:9px;border:2px solid var(--accent-500);border-radius:2.5px;background:var(--surface)}
.marker.leaf .ic{width:14px;height:14px;color:var(--accent-700)}
.marker.dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink-3)}
.badge-root{width:24px;height:24px;flex:0 0 auto;border-radius:6px;display:grid;place-items:center;align-self:center;background:linear-gradient(150deg,var(--accent-500),var(--accent-700));color:#fff;margin-right:2px;box-shadow:0 2px 6px -2px rgba(234,88,12,.7)}
.badge-root .ic{width:14px;height:14px}
.lbl{align-self:center;padding:0 6px;white-space:nowrap;color:var(--ink)}
.row.root .lbl{font-weight:680;font-size:14px;letter-spacing:-.2px}
.lbl-leaf{color:var(--ink-2)}
.cnt{align-self:center;margin-left:4px;font-size:10.5px;color:var(--ink-3);background:var(--surface-3);border:1px solid var(--border);padding:1px 7px;border-radius:99px;font-weight:600}
.node.search-extra > .row{opacity:.52}
.node.search-extra > .row:hover,.node.search-extra > .row:focus-within{opacity:.78}
.row.root{padding-left:2px}

.result-foot{display:flex;align-items:center;gap:10px;margin-top:16px}
.result-foot .spacer{margin-left:auto}

.note{display:flex;gap:11px;padding:14px 16px;border-radius:var(--radius-sm);font-size:13px;align-items:flex-start}
.note.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--accent-200)}
.note.info{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--border)}
.note .ic{width:17px;height:17px;flex:0 0 auto;margin-top:1px}
.note b{font-weight:620}

#overlay{position:fixed;inset:0;z-index:60;background:rgba(236,238,240,.74);backdrop-filter:blur(4px);display:none;place-items:center}
#overlay.show{display:grid;animation:mfade .16s ease}
.loader{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-lg);padding:30px 38px 26px;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:268px;text-align:center;animation:mpop .18s cubic-bezier(.22,1,.36,1)}
.ring{position:relative;width:96px;height:96px;margin-bottom:8px}
.ring::before{content:"";position:absolute;inset:8px;border-radius:50%;background:radial-gradient(closest-side,rgba(234,88,12,.12),transparent 75%);animation:lpulse 2s ease-in-out infinite}
.ring-spin{width:96px;height:96px;transform-origin:center;animation:ringspin 2.4s linear infinite;position:relative;will-change:transform}
.ring svg{width:96px;height:96px;display:block}
.ring-track{fill:none;stroke:var(--tint-2);stroke-width:7}
.ring-prog{fill:none;stroke:url(#lgrad);stroke-width:7;stroke-linecap:round;stroke-dasharray:238.76;stroke-dashoffset:238.76;transition:stroke-dashoffset .3s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 4px rgba(234,88,12,.5))}
@keyframes ringspin{to{transform:rotate(360deg)}}
.ring-num{position:absolute;inset:0;display:grid;place-items:center}
.ring-pct{display:flex;align-items:baseline;font-family:var(--mono);font-weight:760;color:var(--ink);line-height:1}
.ring-pct b{font-size:28px;letter-spacing:-1.2px;font-variant-numeric:tabular-nums}
.ring-pct i{font-size:13px;font-style:normal;color:var(--ink-3);margin-left:2px}
.ring-dots{display:none;gap:6px}
.ring-dots i{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;animation:ld 1s ease-in-out infinite}
.ring-dots i:nth-child(2){animation-delay:.15s}
.ring-dots i:nth-child(3){animation-delay:.3s}
@keyframes ld{0%,100%{opacity:.22;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
@keyframes lpulse{0%,100%{opacity:.5;transform:scale(.92)}50%{opacity:1;transform:scale(1.04)}}
#overlay.indet .ring-pct{display:none}
#overlay.indet .ring-dots{display:inline-flex}
#overlay.indet .ring-prog{stroke-dasharray:60 179;stroke-dashoffset:0;transition:none}
.loader .lmsg{font-weight:680;font-size:15px;letter-spacing:-.2px}
.loader .lsub{font-size:12.5px;color:var(--ink-2);font-family:var(--mono)}
.lcount{font-size:11px;font-family:var(--mono);color:var(--accent-700);letter-spacing:.5px;text-transform:uppercase;margin-top:3px;min-height:14px;font-weight:680}

.modal-back{position:fixed;inset:0;z-index:65;background:rgba(28,30,34,.42);backdrop-filter:blur(2px);display:none;place-items:center;padding:20px}
.modal-back.show{display:grid;animation:mfade .14s ease}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:22px 22px 18px;max-width:430px;width:100%;animation:mpop .16s ease}
@keyframes mpop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:16px;font-weight:640;letter-spacing:-.2px}
.modal-msg{color:var(--ink-2);font-size:13.5px;margin:8px 0 18px;line-height:1.5}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap}
.modal-actions .btn{flex:0 0 auto}
.modal-actions .btn[data-v=cancel]{margin-right:auto}
.update-card{position:relative;max-width:500px}
.update-card.wide{max-width:620px;height:min(500px,calc(100vh - 40px));display:flex;flex-direction:column}
.update-card .update-x{position:absolute;top:12px;right:12px}
.update-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:14px 0 16px}
.update-tab{border:none;background:transparent;color:var(--ink-3);padding:9px 12px;margin-bottom:-1px;border-bottom:2px solid transparent;font:inherit;font-size:13px;font-weight:650;cursor:pointer}
.update-tab:hover{color:var(--ink)}
.update-tab.on{color:var(--accent-700);border-bottom-color:var(--accent-600)}
.update-tab:focus-visible{outline:none;box-shadow:var(--ring);border-radius:6px 6px 0 0}
.update-panel{min-height:0;overflow:hidden}
.update-panel[hidden]{display:none!important}
#updatePanel:not([hidden]),#changelogPanel:not([hidden]){display:flex;flex:1;min-height:0;flex-direction:column}
#updatePanel .modal-actions{margin-top:auto}
.version-row{display:flex;align-items:center;gap:9px;margin:12px 0 10px;font-family:var(--mono);font-size:12px;color:var(--ink-3)}
.version-pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;background:var(--surface-3);border:1px solid var(--border);color:var(--ink-2);font-weight:700}
.version-pill.new{background:var(--accent-100);border-color:var(--accent-200);color:var(--accent-700)}
.release-notes{max-height:190px;overflow:auto;margin:0 0 14px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);font-size:13px;color:var(--ink-2);line-height:1.5}
.release-notes h3{margin:0 0 7px;font-size:12px;color:var(--ink);font-weight:700}
.release-notes ul{margin:0;padding-left:18px}
.release-notes li{margin:3px 0}
.release-notes p{margin:0 0 8px}
.release-notes p:last-child{margin-bottom:0}
.changelog-intro{font-size:12.5px;color:var(--ink-2);margin:0 0 10px;flex:0 0 auto}
.changelog-list{flex:1;min-height:0;max-height:none;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:8px;padding-right:2px}
.change-entry{border-left:3px solid var(--border-strong);border-radius:0 var(--radius-sm) var(--radius-sm) 0;background:var(--surface-2);overflow:hidden;flex:0 0 auto}
.change-entry.major{border-left-color:#f59e0b;background:#fffbeb}
.change-entry.feature{border-left-color:#3b82f6;background:#eff6ff}
.change-entry.fix{border-left-color:#10b981;background:#ecfdf5}
.change-head{width:100%;display:flex;align-items:center;gap:9px;border:none;background:transparent;padding:10px 12px;text-align:left;cursor:pointer;color:var(--ink);font:inherit}
.change-head:hover{background:rgba(255,255,255,.42)}
.change-head:focus-visible{outline:none;box-shadow:var(--ring)}
.change-chev{color:var(--ink-3);transition:transform .14s ease}
.change-entry.closed .change-chev{transform:rotate(-90deg)}
.change-ver{font-weight:760;font-family:var(--mono);font-size:13px}
.change-type{font-size:10px;text-transform:uppercase;letter-spacing:.55px;font-weight:760}
.change-entry.major .change-type{color:#b45309}
.change-entry.feature .change-type{color:#1d4ed8}
.change-entry.fix .change-type{color:#047857}
.change-latest{font-size:9px;text-transform:uppercase;letter-spacing:.7px;font-weight:760;color:var(--accent-700)}
.change-stats{font-size:10.5px;color:var(--ink-3);font-family:var(--mono)}
.change-date{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--mono);white-space:nowrap}
.change-body{padding:0 12px 12px 35px;font-size:13px;color:var(--ink-2);line-height:1.5}
.change-body h3{margin:4px 0 6px;font-size:12px;color:var(--ink);font-weight:700}
.change-body ul{margin:0;padding-left:18px}
.change-body li{margin:3px 0}
.change-entry.closed .change-body{display:none}
.update-status{margin:0 0 14px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--ok-bg);color:var(--ok);font-size:12.5px;font-weight:620}
.update-error{margin:0 0 14px;padding:10px 12px;border-radius:var(--radius-sm);background:#fdecea;color:var(--danger);font-size:12.5px;font-weight:620}

#toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,20px);z-index:70;background:var(--panel);color:#fff;padding:10px 16px;border-radius:99px;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.2s ease;font-family:var(--mono);max-width:80vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translate(-50%,0)}
.version-link{position:fixed;left:16px;bottom:14px;z-index:28;border:none;background:rgba(255,255,255,.74);backdrop-filter:blur(6px);color:var(--ink-2);font-family:var(--mono);font-size:11.5px;font-weight:760;padding:6px 9px;border-radius:7px;box-shadow:var(--shadow-sm);cursor:pointer}
.version-link:hover{color:var(--accent-700);background:var(--surface)}
.version-link:focus-visible{outline:none;box-shadow:var(--ring)}

/* cable schedule group on the sheets screen */
.ficon.cable{background:var(--tint);color:var(--accent-700)}
.cablegrp .grp-h{background:var(--tint)}
.srow.cable .sname .ic{color:var(--accent-600)}
.ficon.pmd{background:#eef3fb;color:#2f5fa8;border-color:#d6e3f5}
.pmdgrp .grp-h{background:#f4f7fc}
.srow.pmd .sname .ic{color:#2f5fa8}

/* cable schedule detail drawer */
.drawer-back{position:fixed;inset:0;z-index:68;background:rgba(28,30,34,.38);backdrop-filter:blur(2px);display:none}
.drawer-back.show{display:block;animation:mfade .14s ease}
.drawer{position:absolute;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;animation:dslide .2s cubic-bezier(.22,1,.36,1)}
@keyframes dslide{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.drawer-title{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:680;font-size:15px;letter-spacing:-.2px;flex:1;min-width:0}
.drawer-title .ic{width:17px;height:17px;color:var(--accent-600);flex:0 0 auto}
.drawer-title span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drawer-head .xbtn{flex:0 0 auto}
.drawer-body{padding:8px 18px 22px;overflow:auto}
.dfield{padding:11px 0;border-bottom:1px solid var(--border)}
.dfield:last-child{border-bottom:none}
.dlabel{font-size:10.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.4px;color:var(--ink-3)}
.dval{font-size:13.5px;font-family:var(--mono);color:var(--ink);margin-top:3px;word-break:break-word}
.dval.empty{color:var(--ink-3)}
.dval.diff{color:var(--accent-700)}
.dpair{display:flex;align-items:baseline;gap:8px;margin-top:5px}
.dsrc{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.3px;color:var(--ink-3);min-width:88px;flex:0 0 auto}
.flag-diff{margin-left:8px;display:inline-flex;align-items:center;gap:3px;color:var(--accent-700);font-size:10px;font-weight:700;text-transform:none;letter-spacing:0}
.flag-diff .ic{width:12px;height:12px}

/* tab bar */
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tabbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border:none;background:transparent;color:var(--ink-2);font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:7px 7px 0 0}
.tabbtn .ic{width:15px;height:15px;color:var(--ink-3)}
.tabbtn:hover{background:var(--surface-2);color:var(--ink)}
.tabbtn.on{color:var(--accent-700);border-bottom-color:var(--accent-600)}
.tabbtn.on .ic{color:var(--accent-600)}
.tabcount{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--surface-3);color:var(--ink-2);font-family:var(--mono);font-size:11px;font-weight:700}
.tabbtn.on .tabcount{background:var(--accent-100);color:var(--accent-700)}
.panel[hidden]{display:none}
.fullbtn{width:36px;height:36px;padding:0;display:grid;place-items:center;flex:0 0 auto}
.fullbtn .ic{width:17px;height:17px}
body.result-fullscreen{overflow:hidden}
#resultShell.fullscreen{position:fixed;inset:0;z-index:66;background:var(--bg);padding:14px 18px;display:flex;flex-direction:column;overflow:hidden}
#resultShell.fullscreen .statwrap,#resultShell.fullscreen .result-foot{display:none}
#resultShell.fullscreen #statsToggle{display:none}
#resultShell.fullscreen .tabbar{flex:0 0 auto;margin-bottom:12px;background:var(--bg)}
#resultShell.fullscreen .panel:not([hidden]){display:flex;flex:1;min-height:0;flex-direction:column}
#resultShell.fullscreen .treecard,#resultShell.fullscreen .tablecard{max-height:none;flex:1;min-height:0}

/* data tables (review / comparison) */
.tablecard{border:1px solid var(--border);border-radius:12px;overflow:auto;background:var(--surface);max-height:62vh;position:relative}
.tablecard.loading{box-shadow:inset 0 2px 0 -1px var(--accent-300)}
.stream-ind{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--accent-700);font-weight:680;white-space:nowrap}
.stream-ind:empty{display:none}
.stream-ind::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);animation:dotpulse .9s ease-in-out infinite}
@keyframes dotpulse{0%,100%{opacity:.3}50%{opacity:1}}
.wc-spin{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--accent);width:34px;height:34px}
.wc-spin .ic{width:19px;height:19px;animation:ringspin .8s linear infinite}
.spin-ic{display:inline-flex;align-items:center}
.spin-ic .ic{animation:ringspin .8s linear infinite}
.ecount{font-family:var(--mono);font-size:11px;opacity:.72;font-weight:700}
.dtable{border-collapse:collapse;width:100%;font-size:13px}
.dtable th,.dtable td{text-align:left;padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:top}
.dtable thead th{position:sticky;top:0;z-index:2;background:var(--surface-2);font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-3);font-weight:700;white-space:nowrap}
.dtable.cmp thead th.sub{top:34px;font-size:10px}
.dtable.review thead th.sub{top:44px;font-size:10px}
.source-head{height:44px;padding:10px 13px 8px!important;background:linear-gradient(180deg,var(--surface),var(--surface-2))!important;border-bottom:none!important;z-index:3!important;text-align:center!important;vertical-align:bottom!important}
.dtable.review .source-head.ep,.dtable.review thead tr:nth-child(2) th:nth-child(4),.dtable.review tbody td:nth-child(4){box-shadow:inset 1px 0 0 rgba(148,163,184,.35)}
.source-head span{position:relative;display:inline-flex;align-items:center;gap:7px;color:var(--ink);font-size:11px;font-weight:780;letter-spacing:.45px;text-transform:uppercase}
.source-head span::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent-600);box-shadow:0 0 0 3px var(--accent-100)}
.source-head span::after{content:"";position:absolute;left:14px;right:0;bottom:-8px;height:2px;border-radius:999px;background:var(--accent-300)}
.source-head.ep span::before{background:#2f5fa8;box-shadow:0 0 0 3px #eef3fb}
.source-head.ep span::after{background:#d6e3f5}
.dtable tbody tr:last-child td{border-bottom:none}
.dtable tbody tr:hover td{background:var(--surface-2)}
.dtable .v-spacer td{padding:0!important;border-bottom:none!important;background:transparent!important}
.dtable .v-spacer:hover td{background:transparent!important}
.dtable td.mono{font-family:var(--mono);font-size:12.5px}
.dtable td.diff{background:rgba(214,108,32,.10);color:var(--accent-700);font-weight:600}
.dtable td.empty{text-align:center;color:var(--ink-3);padding:22px}
.pm{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;padding:2px 8px;border-radius:6px;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--border)}
.pmcell{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.pm.best{background:var(--accent-100);color:var(--accent-700);border-color:var(--accent-200);font-weight:680}
.pmpct{font-size:10.5px;color:var(--ink-3);font-weight:700}
.pm.best .pmpct{color:var(--accent-700)}
.dtable th.sortable{cursor:pointer;user-select:none;padding-right:22px}
.dtable th.sortable::after{content:"↕";position:absolute;right:7px;top:50%;transform:translateY(-50%);opacity:.32;font-size:10px;font-weight:700}
.dtable th.sortable:hover{color:var(--ink)}
.dtable th.sort-asc::after{content:"↑";opacity:1;color:var(--accent-700)}
.dtable th.sort-desc::after{content:"↓";opacity:1;color:var(--accent-700)}
.pctmin{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-family:var(--mono)}
.pctmin .ic{width:14px;height:14px;color:var(--ink-3)}
.pctmin input{width:46px;border:none;background:transparent;font:inherit;color:var(--accent-700);font-weight:700;text-align:right;padding:0;outline:none}
.pctmin input::-webkit-outer-spin-button,.pctmin input::-webkit-inner-spin-button{margin-left:2px}
.selectctl{height:40px;display:inline-flex;align-items:center;gap:7px;padding:0 9px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);color:var(--ink-2)}
.selectctl .ic{width:15px;height:15px;color:var(--ink-3)}
.selectctl select{min-width:142px;border:0;background:transparent;color:var(--ink);font:600 12.5px var(--sans);outline:none;cursor:pointer}
.selectctl:focus-within{border-color:var(--accent-400);box-shadow:var(--ring)}
.pct{font-family:var(--mono);font-size:12px;color:var(--ink-2)}
.pct.hi{color:var(--ok,#1d7a4d);font-weight:700}
.muted{color:var(--ink-3)}
.subtle{display:block;font-size:10.5px;color:var(--ink-3);margin-top:2px}
.cbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 9px 2px 7px;border-radius:20px;font-family:var(--mono);white-space:nowrap}
.cbadge .ic{width:12px;height:12px}
.cbadge.match{background:rgba(29,122,77,.12);color:#1d7a4d}
.cbadge.off{background:rgba(214,108,32,.16);color:var(--accent-700)}
.cbadge.nohit{background:var(--surface-3);color:var(--ink-2)}
.dtable tr.r-off>td:first-child{box-shadow:inset 3px 0 0 var(--accent-500)}
.dtable tr.r-match>td:first-child{box-shadow:inset 3px 0 0 #22a06b}
.dtable tr.r-nohit>td:first-child{box-shadow:inset 3px 0 0 var(--ink-3)}
.dtable tr.r-off:hover td{background:rgba(214,108,32,.05)}
.cmp-legend{flex-wrap:wrap}
.cmp-legend .lg{display:inline-flex;align-items:center;gap:6px;margin-right:14px;margin-top:6px;font-size:12px;color:var(--ink-2)}
.ok-t{color:#1d7a4d}
.warn-t{color:var(--accent-700)}
.chip.sm{padding:5px 11px;font-size:12.5px}

/* load-description rows + dependency */
.row.is-load .lbl{font-style:italic}
.marker.load{color:var(--accent-600)}
.marker.load .ic{width:13px;height:13px}
.dep.dep-load{background:var(--accent-100);border-color:var(--accent-200);color:var(--accent-700)}
.dep.pmd-link{background:#eef3fb;border-color:#d6e3f5;color:#2f5fa8}
.row.is-instrument .lbl{color:#2f5fa8}
.marker.instrument{color:#2f5fa8}
.marker.instrument .ic{width:13px;height:13px}

/* current working copy import */
.wc-import{margin-top:14px;border:1px dashed var(--border);border-radius:12px;padding:14px 16px;background:var(--surface)}
.wc-head{display:flex;gap:11px;align-items:flex-start}
.wc-head>.ic{width:18px;height:18px;color:var(--accent-600);flex:0 0 auto;margin-top:2px}
.wc-t{font-weight:680;font-size:14px}
.wc-t .opt{font-weight:500;font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.4px;margin-left:6px}
.wc-s{font-size:12.5px;color:var(--ink-2);margin-top:2px}
#wcslot{margin-top:12px}
#wcslot .frow{margin:0}

@media (max-width:820px){
  .topbar-in{padding:4px 16px}
  .brand{gap:8px;margin-left:-6px}
  .lotus-logo{height:60px;max-width:195px}
  .steps{width:100%;margin-left:0;justify-content:space-between}
  .step{padding:5px 8px;font-size:11px}
  .step-sep{display:none}
  #view{padding:20px 14px 56px}
  .pad{padding:18px}
  .statbar{grid-template-columns:repeat(3,1fr)}
  .editpanel{grid-template-columns:1fr}
  .tools{margin-left:0;width:100%}
  .search{max-width:none}
  .brand .tag{display:none}
  #resultShell.fullscreen{padding:10px}
}
@media (min-width:1081px){
  .topbar{--content-left:calc((100vw - 1080px)/2 + 22px);--brand-safe-left:190px;--brand-main-left:max(var(--content-left),var(--brand-safe-left));--brand-main-local:calc(var(--brand-main-left) - ((100vw - 1080px)/2))}
  .topbar-in{position:relative;min-height:66px}
  .brand{display:contents}
  .lotus-logo{position:absolute;left:calc(22px - ((100vw - 1080px)/2));top:50%;transform:translateY(-50%)}
  .brand .mark{position:absolute;left:var(--brand-main-local);top:50%;transform:translateY(-50%)}
  .brand>div:last-child{position:absolute;left:calc(var(--brand-main-local) + 46px);top:50%;transform:translateY(-50%)}
}
@media (pointer:coarse){
  .btn,.chip,.tabbtn,.srow,.editcols{min-height:44px}
  .xbtn{min-width:44px;min-height:44px}
  .dz{min-height:240px;display:grid;place-items:center}
  .update-card{max-width:min(500px,calc(100vw - 28px))}
  .update-card.wide{max-width:calc(100vw - 28px);height:calc(100dvh - 28px)}
  .version-link{min-height:36px;bottom:10px;left:10px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation-duration:.001ms!important}

function isNewerVersion(remote,local){
  const r=String(remote||'').replace(/^v/i,'').split('.').map(Number);
  const l=String(local||'').replace(/^v/i,'').split('.').map(Number);
  const len=Math.max(r.length,l.length);
  for(let i=0;i<len;i++){
    const rv=Number.isFinite(r[i])?r[i]:0,lv=Number.isFinite(l[i])?l[i]:0;
    if(rv>lv)return true;
    if(rv<lv)return false;
  }
  return false;
}
function selectUpdateAsset(assets){
  const htmlAsset=assets&&assets.find(asset=>String(asset.name||'').toLowerCase().endsWith('.html'));
  if(!htmlAsset)return null;
  const gzipAsset=assets.find(asset=>String(asset.name||'').toLowerCase().endsWith('.html.gz'));
  if(!gzipAsset)return {downloadUrl:htmlAsset.browser_download_url,assetApiUrl:htmlAsset.url,assetName:htmlAsset.name,downloadKind:'html'};
  return {
    downloadUrl:gzipAsset.browser_download_url,
    assetApiUrl:gzipAsset.url,
    assetName:gzipAsset.name,
    downloadKind:'gzip-html',
    fallbackDownloadUrl:htmlAsset.browser_download_url,
    fallbackAssetApiUrl:htmlAsset.url,
    fallbackAssetName:htmlAsset.name
  };
}
function rawUpdateUrl(tagName,assetName){
  const tag=String(tagName||'').trim();
  const name=getHtmlFilename(assetName||'SSM-Builder.html');
  return tag?UPDATE_RAW_BASE+'/'+encodeURIComponent(tag)+'/'+encodeURIComponent(name):'';
}
async function checkForAppUpdate(){
  let timer=0;
  try{
    const controller=new AbortController();
    timer=setTimeout(()=>controller.abort(),UPDATE_TIMEOUT_MS);
    const res=await fetch(UPDATE_RELEASE_API,{signal:controller.signal,headers:{Accept:'application/vnd.github.v3+json'}});
    if(!res.ok)return null;
    const release=await res.json();
    const tagName=String(release.tag_name||'');
    const remoteVersion=tagName.replace(/^v/i,'');
    if(!isNewerVersion(remoteVersion,APP_VERSION))return null;
    const selected=selectUpdateAsset(release.assets);
    if(!selected)return null;
    return {version:remoteVersion,tagName,releaseNotes:release.body||'',rawDownloadUrl:rawUpdateUrl(tagName,'SSM-Builder.html'),...selected};
  }catch(e){return null;}
  finally{if(timer)clearTimeout(timer);}
}
function isPwaHostedApp(){
  return !!document.querySelector('meta[name="ssm-builder-pwa"][content="true"]');
}
function getHtmlFilename(assetName,fallbackAssetName){
  if(fallbackAssetName)return fallbackAssetName;
  return String(assetName||'SSM-Builder.html').toLowerCase().endsWith('.gz')?assetName.slice(0,-3):assetName;
}
function versionedUpdateFilename(version){
  const cleanVersion=String(version||APP_VERSION).replace(/^v/i,'').replace(/[^0-9A-Za-z._-]/g,'').trim()||APP_VERSION;
  return 'SSM-Builder-v'+cleanVersion+'.html';
}
function getDecompressionStream(){
  return typeof DecompressionStream==='function'?DecompressionStream:null;
}
function canDecompressGzipInBrowser(){
  return !!getDecompressionStream();
}
async function decompressGzipHtml(blob){
  const Stream=getDecompressionStream();
  if(!Stream)throw new Error('This browser cannot decompress gzip updates.');
  const decompressed=blob.stream().pipeThrough(new Stream('gzip'));
  const htmlBlob=await new Response(decompressed).blob();
  return new Blob([htmlBlob],{type:'text/html'});
}
async function fetchGitHubAssetBlob(assetApiUrl){
  const res=await fetch(assetApiUrl,{headers:{Accept:'application/octet-stream'}});
  if(!res.ok)throw new Error('Update download failed: HTTP '+res.status);
  return res.blob();
}
async function fetchRawUpdateHtml(rawUrl,version){
  if(!rawUrl)throw new Error('No raw update URL is available.');
  const res=await fetch(rawUrl,{headers:{Accept:'text/html,text/plain,*/*'}});
  if(!res.ok)throw new Error('Update download failed: HTTP '+res.status);
  const html=await res.text();
  if(!/<html[\s>]/i.test(html)||!html.includes("const APP_VERSION = '"+version+"'")){
    throw new Error('Downloaded update did not match the expected app version.');
  }
  return new Blob([html],{type:'text/html'});
}
function saveUpdateFromUrl(url,filename){
  if(!url)throw new Error('No direct update URL is available.');
  const a=document.createElement('a');
  a.href=url;a.download=filename||'SSM-Builder.html';a.rel='noopener';
  document.body.appendChild(a);a.click();a.remove();
}
async function downloadUpdateFile(info){
  const plainName=getHtmlFilename(info.fallbackAssetName||info.assetName||'SSM-Builder.html');
  const filename=versionedUpdateFilename(info.version);
  if(info.rawDownloadUrl){
    try{
      const htmlBlob=await fetchRawUpdateHtml(info.rawDownloadUrl,info.version);
      await saveUpdateHtml(htmlBlob,filename);
      return {downloadedAssetName:plainName,savedFilename:filename,usedCompressedAsset:false,source:'raw'};
    }catch(e){}
  }
  if(info.downloadKind==='gzip-html'&&canDecompressGzipInBrowser()){
    try{
      const compressedBlob=await fetchGitHubAssetBlob(info.assetApiUrl);
      const htmlBlob=await decompressGzipHtml(compressedBlob);
      await saveUpdateHtml(htmlBlob,filename);
      return {downloadedAssetName:info.assetName,savedFilename:filename,usedCompressedAsset:true};
    }catch(e){}
  }
  const assetApiUrl=info.downloadKind==='gzip-html'?info.fallbackAssetApiUrl:info.assetApiUrl;
  const assetName=info.downloadKind==='gzip-html'?info.fallbackAssetName:info.assetName;
  if(!assetApiUrl||!assetName)throw new Error('No compatible update asset is available.');
  try{
    const htmlBlob=await fetchGitHubAssetBlob(assetApiUrl);
    await saveUpdateHtml(htmlBlob,filename);
    return {downloadedAssetName:assetName,savedFilename:filename,usedCompressedAsset:false,source:'asset-api'};
  }catch(e){
    const directUrl=info.downloadKind==='gzip-html'?info.fallbackDownloadUrl:info.downloadUrl;
    saveUpdateFromUrl(directUrl,filename);
    return {downloadedAssetName:assetName,savedFilename:filename,usedCompressedAsset:false,source:'direct-url'};
  }
}
function notesHtml(md){
  const lines=String(md||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return '';
  let html='',open=false;
  const close=()=>{if(open){html+='</ul>';open=false;}};
  for(const line of lines){
    const h=line.match(/^###\s+(.+)/);
    const bullet=line.match(/^[-*]\s+(.+)/);
    if(h){close();html+='<h3>'+esc(h[1])+'</h3>';continue;}
    if(bullet){if(!open){html+='<ul>';open=true;}html+='<li>'+esc(bullet[1])+'</li>';continue;}
    close();html+='<p>'+esc(line)+'</p>';
  }
  close();
  return html;
}
function releaseTypeForVersion(version){
  const p=String(version||'').split('.').map(Number);
  if((p[0]||0)>1&&!(p[1]||0)&&!(p[2]||0))return 'major';
  if((p[1]||0)>0&&!(p[2]||0))return 'feature';
  return 'fix';
}
function typeLabel(type){return type==='major'?'Major':type==='feature'?'Feature':'Fix';}
function formatChangeDate(iso){
  const d=new Date(iso);if(Number.isNaN(d.getTime()))return '';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function changelogEntries(info){
  if(!info||!info.version||!info.releaseNotes)return CHANGELOG;
  if(CHANGELOG.some(e=>e.version===info.version))return CHANGELOG;
  return [{version:info.version,date:new Date().toISOString(),type:releaseTypeForVersion(info.version),notes:info.releaseNotes},...CHANGELOG];
}
function renderChangelog(info){
  const entries=changelogEntries(info);
  const body=entries.map((entry,i)=>{
    const closed=i>0?' closed':'';
    const latest=i===0?'<span class="change-latest">latest</span>':'';
    const stats=entry.stats?Object.entries(entry.stats).filter(([,v])=>v).map(([k,v])=>v+' '+(k==='fixes'?'fix'+(v>1?'es':''):k.slice(0,-1)+(v>1?'s':''))).join(' · '):'';
    return `<div class="change-entry ${esc(entry.type)}${closed}" data-version="${esc(entry.version)}">
      <button class="change-head" type="button" data-change="${esc(entry.version)}">
        <span class="change-chev">${ic('chevron-down')}</span>
        <span class="change-ver">v${esc(entry.version)}</span>
        <span class="change-type">${esc(typeLabel(entry.type))}</span>
        ${latest}
        ${stats?`<span class="change-stats">${esc(stats)}</span>`:''}
        <span class="change-date">${esc(formatChangeDate(entry.date))}</span>
      </button>
      <div class="change-body">${notesHtml(entry.notes)}</div>
    </div>`;
  }).join('');
  return `<p class="changelog-intro">Recent SSM Builder changes, newest first.</p><div class="changelog-list">${body}</div>`;
}

/* ---- tag classifiers ---- */
const tagTokens=n=>String(n).toUpperCase().split(/[^A-Z]+/).filter(Boolean);
const isGisTag=n=>tagTokens(n).includes('GIS');

const isSpaceName=n=>{const s=clean(n);return /^space(?:[\s\-_\d]|$)/i.test(s);};
const isNote=v=>/^note\s*\d*$/i.test(clean(v));
/* Load Description becomes the lowest leaf; disregard blanks, NOTEs, and values
   identical to the node it would nest under (its ID Name / Final Source). */
function validLoad(loadDesc,deepest){const ld=clean(loadDesc);return !!ld&&!isNote(ld)&&ld!==clean(deepest);}
/* separator-aware fuzzy matching: "ABC-1" vs "ABC_1" reads as 100% */
const normSep=s=>clean(s).toLowerCase().replace(/[\s\-_\/.]+/g,'');
function levDist(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;let prev=[...Array(n+1).keys()],cur=new Array(n+1);for(let i=1;i<=m;i++){cur[0]=i;for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+c);}[prev,cur]=[cur,prev];}return prev[n];}

/* top-N closest names (deduped, ranked best-first) for the Review possible-match column */
function topFuzzy(name,pool,n,min){
  const t=min==null?70:min,ns=normSep(name),seen=new Set(),out=[];
  for(const c of pool){
    if(Math.abs(normSep(c).length-ns.length)>4)continue;
    const k=c.toLowerCase();if(seen.has(k))continue;
    const p=simPct(name,c);if(p>=t){seen.add(k);out.push({match:c,pct:p});}

/* Drop "…GIS → BUS → GIS…": disregard the BUS and everything above it, re-rooting

    for(let i=1;i<s.length-1;i++){

/* ---- loading / toast ---- */
const RING_C=238.76; // 2·π·38
let _pCur=0,_pTarget=0,_pRAF=0;
function _pTick(){
  const d=_pTarget-_pCur;
  if(Math.abs(d)<0.4)_pCur=_pTarget;else _pCur+=d*0.2;
  const r=$('#lring'),n=$('#lpct');
  if(n)n.textContent=Math.round(_pCur);

}
/* frac: 0..1 for a real %, or null for an indeterminate sweep. label: the step counter. */
function setProgress(frac,label){
  const ov=$('#overlay');if(!ov)return;
  if(label!=null)$('#lcount').textContent=label;
  if(frac==null){ov.classList.add('indet');return;}
  ov.classList.remove('indet');
  _pTarget=Math.max(0,Math.min(100,frac*100));
  if(!_pRAF)_pRAF=requestAnimationFrame(_pTick);
}
function showOverlay(msg,sub){
  $('#lmsg').textContent=msg;$('#lsub').textContent=sub||'';$('#lcount').textContent='';
  _pCur=0;_pTarget=0;if(_pRAF){cancelAnimationFrame(_pRAF);_pRAF=0;}
  $('#lpct').textContent='0';$('#lring').style.strokeDashoffset=RING_C;
  $('#overlay').classList.add('indet');$('#overlay').classList.add('show');

function hideOverlay(){$('#overlay').classList.remove('show');}
/* Adaptive yield: hand control back to the browser whenever a tight loop has held
   the main thread for >~28ms, so huge datasets never trip the "page unresponsive"
   dialog. Reports progress at the same time so the bar advances smoothly. */
let _yT=0;
function resetYield(){_yT=performance.now();}
async function maybeYield(report,frac,label){
  const now=performance.now();
  if(now-_yT>28){if(report)report(frac,label);await raf();_yT=performance.now();}
}
async function withLoading(msg,sub,fn){
  showOverlay(msg,sub);
  const t0=performance.now();
  try{return await fn(setProgress);}
  finally{
    setProgress(1);
    const el=performance.now()-t0,minT=560;
    await sleep(el<minT?minT-el:240);
    hideOverlay();
  }
}
/* Runs chunked work and only reveals the loader if the work is still going after
   `delay` ms. `work` receives (checkpoint, report); fast work finishes first -> no flash. */
async function deferredRun(msg,sub,work,delay){
  let shown=false,shownAt=0;
  const timer=setTimeout(()=>{shown=true;shownAt=performance.now();showOverlay(msg,sub);},delay==null?500:delay);
  const checkpoint=()=>raf();
  const report=(f,l)=>{if(shown)setProgress(f,l);};
  try{return await work(checkpoint,report);}
  finally{
    clearTimeout(timer);
    if(shown){setProgress(1);const el=performance.now()-shownAt;if(el<360)await sleep(360-el);else await sleep(160);hideOverlay();}
  }
}

/* ---- column detection ---- */
function findHeaderRow(aoa){

function autoDetect(headers){

/* ---- cable schedule detection (Load Name (To) -> Panel (From)) + detail columns ---- */

  ['Load Name (To)',     h=>h==='loadnameto'||(h.includes('loadname')&&h.includes('to'))],
  ['Panel (From)',       h=>h==='panelfrom'||(h.includes('panel')&&h.includes('from'))],

    if(!n.kids.has(seg))n.kids.set(seg,{name:seg,kids:new Map(),isId:false});
    n=n.kids.get(seg);
    if(i===p.length-1&&hasId)n.isId=true;
  }
  return n; // deepest node
}
function addLoadChild(deepNode,loadName){
  if(!deepNode.kids.has(loadName))deepNode.kids.set(loadName,{name:loadName,kids:new Map(),isId:false,isLoad:true});
  else deepNode.kids.get(loadName).isLoad=true;
}
function buildRoots(root){
  let id=0;
  const conv=(m,depth,parent)=>{
    const node={id:'n'+(id++),name:m.name,depth,isId:m.isId,isLoad:!!m.isLoad,parent,children:[],
      isInstrument:!!m.isInstrument,description:m.description||'',pmdKey:m.pmdKey||'',pmdPanel:m.pmdPanel||'',pmdBuilding:m.pmdBuilding||'',
      isSpare:isSpareName(m.name),isSpace:isSpaceName(m.name)};
    node.children=[...m.kids.values()].sort((a,b)=>natCmp(a.name,b.name)).map(k=>conv(k,depth+1,node));
    return node;
  };
  return dedupRoots([...root.kids.values()].sort((a,b)=>natCmp(a.name,b.name)).map(k=>conv(k,0,null)));
}
function finalize(root){ // combined tree: build, then index nodeById for click/drawer
  const roots=buildRoots(root);
  S.nodeById=new Map();
  const idx=n=>{S.nodeById.set(n.id,n);n.children.forEach(idx);};
  roots.forEach(idx);
  return roots;
}
/* per-sheet tree is only needed for the "separate" Hierarchy export — build it lazily */
function sheetRoots(sh){if(!sh._roots)sh._roots=buildRoots(sh._sMap);return sh._roots;}
function computeStats(roots){
  let nodes=0,leaves=0,maxDepth=0,idCount=0;
  const walk=n=>{nodes++;if(n.depth>maxDepth)maxDepth=n.depth;if(n.isId)idCount++;
    if(!n.children.length)leaves++;n.children.forEach(walk);};
  roots.forEach(walk);
  return {nodes,leaves,maxDepth:maxDepth+1,idCount,sources:roots.length};
}

async function buildDeps(tick){
  S.deps=new Map();S.depDetail=new Map();S.hasCable=false;
  for(const key of S.cableSel){
    const [fid]=key.split(KEYSEP);if(!fileById(fid))continue;
    const ci=cableInfo(key);if(!ci)continue; // named "Cable Schedule" but no Load/Panel columns -> nothing to attach
    const {map,headerRow}=ci;
    S.hasCable=true;
    const {aoa}=getAoa(key);
    const loadC=map['Load Name (To)'],panelC=map['Panel (From)'],ents=Object.entries(map);
    for(let i=headerRow+1;i<aoa.length;i++){
      if(tick)await tick('Reading cable schedule');
      const row=aoa[i],load=cleanTag(row[loadC]);if(!load)continue;
      const lk=load.toLowerCase(),panel=cleanTag(row[panelC]);
      if(!S.deps.has(lk)&&panel)S.deps.set(lk,panel);
      if(!S.depDetail.has(lk)){
        const fields={};for(const [label,idx] of ents)fields[label]=(label==='Load Name (To)'||label==='Panel (From)')?cleanTag(row[idx]):clean(row[idx]);
        S.depDetail.set(lk,fields);
      }
    }
  }
}
async function buildPmd(tick){
  S.pmdRows=[];S.pmdPanels=[];S.pmdLinks=[];S.pmdPanelMap=new Map();S.pmdSuffixMap=new Map();S.pmdDetail=new Map();S.pmdMatchedPanels=new Set();
  const seen=new Set();
  for(const key of S.pmdSel){
    const [fid]=key.split(KEYSEP);if(!fileById(fid))continue;
    const pi=pmdInfo(key);if(!pi)continue;
    const {map,headerRow}=pi,{aoa}=getAoa(key);
    for(let i=headerRow+1;i<aoa.length;i++){
      if(tick)await tick('Reading Point Master Database');
      const row=aoa[i],panel=cleanTag(row[map.PANEL]),tag=cleanTag(row[map['INSTRUMENT TAG']]);
      if(!panel||!tag)continue;
      const parts=pmdPanelMatchParts(panel),panelKey=parts.key;if(!panelKey)continue;
      const recKey=panelKey+KEYSEP+tag.toLowerCase();if(seen.has(recKey))continue;seen.add(recKey);
      const fields={};for(const [label] of PMD_FIELDS)if(map[label]!=null)fields[label]=clean(row[map[label]]);
      const rec={key:recKey,panel,panelKey,tag,description:fields.DESCRIPTION||'',fields};
      S.pmdRows.push(rec);S.pmdDetail.set(recKey,rec);
      let group=S.pmdPanelMap.get(panelKey);
      if(!group){
        group={key:panelKey,panel,building:parts.building,matchKey:parts.matchKey,instruments:[]};S.pmdPanelMap.set(panelKey,group);
        if(group.matchKey&&group.matchKey!==group.key){const matches=S.pmdSuffixMap.get(group.matchKey)||[];matches.push(group);S.pmdSuffixMap.set(group.matchKey,matches);}
      }
      group.instruments.push(rec);

function _attachPmdInstruments(root,collect){
  let attached=0;const linkSeen=new Set();

    const originalKids=[...m.kids.values()];

      const matches=pmdPanelsForLoad(m.name);
      if(matches.length){
        m.pmdPanel=[...new Set(matches.map(match=>match.panel.panel))].join(', ');
        m.pmdBuilding=[...new Set(matches.map(match=>match.building).filter(Boolean))].join(', ');
        for(const match of matches){
          const {panel,building}=match;S.pmdMatchedPanels.add(panel.key);
          for(const rec of panel.instruments){
            if(!m.kids.has(rec.tag))m.kids.set(rec.tag,{name:rec.tag,kids:new Map(),isId:false,isInstrument:true,description:rec.description,pmdKey:rec.key,pmdPanel:panel.panel,pmdBuilding:building});

function appendPmdSsmRows(rows,includeUnmatched){

  const links=S.pmdLinks.filter(link=>includeUnmatched||rowKeys.has(link.loadKey));
  if(includeUnmatched){
    for(const panel of S.pmdPanels){
      if(S.pmdMatchedPanels.has(panel.key))continue;

async function buildHierarchy(){
  const keys=[...S.selected];if(!keys.length)return;
  clearResultCache();
  await withLoading('Building hierarchy',keys.length+' tab'+(keys.length!==1?'s':''),async(report)=>{
    resetYield();
    // weight progress by actual rows so the bar tracks reality on big datasets
    const rowsIn=key=>{const {aoa,headerRow}=getAoa(key);return Math.max(0,aoa.length-headerRow-1);};
    let cableRows=0;for(const k of S.cableSel)if(cableInfo(k)){cableRows+=Math.max(0,(getAoa(k).aoa.length)-(cableInfo(k).headerRow)-1);}
    let pmdRows=0;for(const k of S.pmdSel)if(pmdInfo(k)){pmdRows+=Math.max(0,getAoa(k).aoa.length-pmdInfo(k).headerRow-1);}
    let hierRows=0;for(const k of keys)hierRows+=rowsIn(k);
    const total=Math.max(1,cableRows+pmdRows+hierRows);let done=0;
    const READ_LO=.03,READ_HI=.78;
    const tick=async(label)=>{done++;await maybeYield(report,READ_LO+(READ_HI-READ_LO)*(done/total),label);};

    report(.02,'Reading source data');await raf();
    await buildDeps(tick);
    await buildPmd(tick);
    S.epDetail=new Map();
    const combined={name:'__root__',kids:new Map()};let rowsRead=0,loadCount=0;
    const seenC=new Set(),ssmCombined=[],sheets=[];
    const noteEP=(name,circuit)=>{const k=clean(name).toLowerCase();if(!k)return;const e=S.epDetail.get(k)||{};if(circuit&&e.circuit==null)e.circuit=circuit;S.epDetail.set(k,e);};
    for(let t=0;t<keys.length;t++){
      const key=keys[t];
      const [fid,sheetName]=key.split(KEYSEP);
      const {aoa,headerRow}=getAoa(key),cols=resolveCols(key);
      const label=`Tab ${t+1} of ${keys.length}`;
      const sMap={name:'__root__',kids:new Map()};
      const seenS=new Set(),ssmRows=[];
      for(let i=headerRow+1;i<aoa.length;i++){
        await tick(label);
        let {segs,hasId,loadDesc}=rowToPath(aoa[i],cols);
        segs=gisBusCut(segs);              // disregard BUS + everything above a GIS→BUS→GIS
        if(!segs.length)continue;
        rowsRead++;
        const deepest=segs[segs.length-1];
        const circuit=cols.circuit>=0?clean(aoa[i][cols.circuit]):'';
        if(circuit)noteEP(deepest,circuit);
        const lcDeep=insertPath(combined,segs,hasId), lsDeep=insertPath(sMap,segs,hasId);
        // SSM rows in spreadsheet (row) order; each unique node once (keyed by full path)
        let acc='';
        for(let j=0;j<segs.length;j++){
          acc=j?acc+KEYSEP+segs[j]:segs[j];
          const equip=segs[j],parent=j?segs[j-1]:'';
          if(!seenC.has(acc)){seenC.add(acc);ssmCombined.push([equip,parent]);}
          if(!seenS.has(acc)){seenS.add(acc);ssmRows.push([equip,parent]);}
        }
        // Load Description -> lowest leaf, nested under deepest; dependency = deepest (parent)
        if(validLoad(loadDesc,deepest)){
          addLoadChild(lcDeep,loadDesc);addLoadChild(lsDeep,loadDesc);
          if(circuit)noteEP(loadDesc,circuit);
          const lkey=acc+KEYSEP+'\u0006'+loadDesc;
          if(!seenC.has(lkey)){seenC.add(lkey);ssmCombined.push([loadDesc,'',deepest]);loadCount++;}
          if(!seenS.has(lkey)){seenS.add(lkey);ssmRows.push([loadDesc,'',deepest]);}
        }
      }
      sheets.push({key,sheetName,fileName:fileById(fid).name,_sMap:sMap,ssmRows}); // tree built lazily on export
    }
    report(.80,'Linking PMD instruments');await raf();
    const instrumentCount=attachPmdInstruments(combined);
    for(const sh of sheets)_attachPmdInstruments(sh._sMap,null);
    S.sheets=sheets;S.ssmCombined=appendPmdSsmRows(ssmCombined,true);
    for(const sh of S.sheets)sh.ssmRows=appendPmdSsmRows(sh.ssmRows,false);
    report(.82,'Finalizing tree');await raf();
    S.roots=finalize(combined); // call last so nodeById matches the displayed combined tree
    // every equipment name in the Easy Power hierarchy (for cable cross-check)
    report(.86,'Indexing equipment');await raf();
    S.epNameSet=new Set();const collect=n=>{S.epNameSet.add(clean(n.name).toLowerCase());n.children.forEach(collect);};S.roots.forEach(collect);
    if(S.hasCable){report(.88,'Cross-checking cable schedule');await raf();}
    await buildReview(report);
    if(S.wcRows){report(.96,'Comparing working copy');await raf();await buildComparison(report);}
    S.stats=computeStats(S.roots);
    S.stats.rowsRead=rowsRead;S.stats.tabs=keys.length;
    S.stats.files=new Set(keys.map(k=>k.split(KEYSEP)[0])).size;
    S.stats.deps=S.deps.size;S.stats.loads=loadCount;S.stats.instruments=instrumentCount;S.stats.review=S.review.length;
    report(1,'Done');
  });

  S.search='';S.idOnly=false;S.showSpares=true;S.showSpaces=true;S.showDeps=S.hasCable||(S.stats&&S.stats.loads>0);S.showPmdMatches=true;

/* Cable Schedule loads with no exact match in Easy Power. Uses normalized-separator
   and prefix-bucket indexes so the fuzzy step stays cheap even on 75k+ names. */
async function buildReview(report){
  S.review=[];if(!S.hasCable)return;
  // index over original-case node names, bucketed by normalized-separator prefix
  const epPref=new Map();
  const idx=n=>{const nm=clean(n.name);if(nm){const p=normSep(nm).slice(0,3);let a=epPref.get(p);if(!a){a=[];epPref.set(p,a);}a.push(nm);}n.children.forEach(idx);};
  S.roots.forEach(idx);
  resetYield();const seen=new Set();
  let totalCable=0;for(const k of S.cableSel){const ci=cableInfo(k);if(ci)totalCable+=Math.max(0,getAoa(k).aoa.length-ci.headerRow-1);}
  totalCable=Math.max(1,totalCable);let cdone=0;
  for(const key of S.cableSel){
    const [fid]=key.split(KEYSEP);if(!fileById(fid))continue;
    const ci=cableInfo(key);if(!ci)continue;
    const {map,headerRow}=ci,{aoa}=getAoa(key);
    const loadC=map['Load Name (To)'],panelC=map['Panel (From)'],circC=map['Circuit_Number'];
    for(let i=headerRow+1;i<aoa.length;i++){
      cdone++;if(report)await maybeYield(report,.88+.06*(cdone/totalCable),'Cross-checking cable schedule');
      const load=cleanTag(aoa[i][loadC]);if(!load)continue;
      const lk=load.toLowerCase();
      if(S.epNameSet.has(lk))continue;          // exact match — fine
      if(seen.has(lk))continue;seen.add(lk);
      const matches=topFuzzy(load,epPref.get(normSep(load).slice(0,3))||[],3); // up to 3, best-first
      const rec={load,panel:cleanTag(aoa[i][panelC]),circuit:circC!=null?clean(aoa[i][circC]):'',matches};
      S.review.push({...rec,searchKey:reviewSearchKey(rec)});
    }
  }
}
/* Resolve a stored SSM row [equip, parent, depOverride] to display values. */
function ssmResolve(r){const e=cleanTag(r[0]),par=cleanTag(r[1]||''),dep=r[2]!=null?cleanTag(r[2]):(depOf(e)||'');return {equip:e,parent:par,dep};}
function sameRegisterValue(a,b){return clean(a).toLowerCase()===clean(b).toLowerCase();}
function registerDepValue(parent,dep){
  const d=clean(dep);
  return d&&sameRegisterValue(parent,d)?'N/A':d;
}
function ssmRegisterResolve(r){const o=ssmResolve(r);return {...o,dep:registerDepValue(o.parent,o.dep)};}
/* Compare the current SSM register against an imported "Current Working Copy". */
async function buildComparison(report){
  S.compare=[];S.compareBuckets={all:[],off:[],nohit:[],match:[]};if(!S.wcRows)return;
  resetYield();
  const total=Math.max(1,S.ssmCombined.length+S.wcRows.length+S.ssmCombined.length);let cdone=0;
  const cur=new Map();for(const r of S.ssmCombined){const o=ssmResolve(r);cur.set(o.equip.toLowerCase(),o);cdone++;if(report)await maybeYield(report,.96+.03*(cdone/total),'Comparing working copy');}
  const wc=new Map();for(const o of S.wcRows)wc.set(o.equip.toLowerCase(),o);
  const eq=sameRegisterValue;
  const keys=new Set([...cur.keys(),...wc.keys()]);
  for(const k of keys){
    cdone++;if(report)await maybeYield(report,.96+.03*(cdone/total),'Comparing working copy');
    const a=cur.get(k),b=wc.get(k);let status;
    const curParent=a?a.parent:'';
    const curDep=a?registerDepValue(a.parent,a.dep):'';
    const wcParent=b?b.parent:'';
    const wcDep=b?registerDepValue(b.parent,b.dep):'';
    if(a&&b)status=(eq(curParent,wcParent)&&eq(curDep,wcDep))?'match':'off';
    else status='nohit';
    const rec={equip:a?a.equip:b.equip,
      curParent,curDep,wcParent,wcDep,
      inCur:!!a,inWc:!!b,status};
    S.compare.push({...rec,searchKey:compareSearchKey(rec)});
  }
  S.compare.sort((x,y)=>({off:0,nohit:1,match:2}[x.status]-{off:0,nohit:1,match:2}[y.status])||natCmp(x.equip,y.equip));

}

/* Progressively fill a <tbody> WITHOUT a blocking overlay: the first rows show
   immediately and the rest stream in over animation frames, so the page stays
   navigable. A render token cancels an in-flight stream if the view changes. */
let _renderTok=0;
function bumpRender(){_renderTok++;}
async function streamRows(sel,items,makeRow,emptyHtml,ui){
  const tok=++_renderTok;
  let tb=$(sel);if(!tb)return;
  const card=ui&&ui.card?$(ui.card):null;
  const setInd=t=>{if(ui&&ui.ind){const e=$(ui.ind);if(e)e.textContent=t||'';}};
  const stop=()=>{if(card)card.classList.remove('loading');setInd('');};
  if(!items.length){tb.innerHTML=emptyHtml;if(ui&&ui.onDone)ui.onDone();stop();return;}
  const N=items.length,FIRST=Math.min(N,200),CHUNK=600;
  let i=0,buf='';
  for(;i<FIRST;i++)buf+=makeRow(items[i]);
  tb.innerHTML=buf;                         // instant, usable table
  if(i>=N){if(ui&&ui.onDone)ui.onDone();stop();return;}
  if(card)card.classList.add('loading');setInd(`${i.toLocaleString()} / ${N.toLocaleString()}`);
  while(i<N){
    await raf();
    if(tok!==_renderTok)return;             // superseded by a newer render -> abandon
    const end=Math.min(N,i+CHUNK);let frag='';
    for(;i<end;i++)frag+=makeRow(items[i]);
    tb=$(sel);if(!tb||tok!==_renderTok)return;
    tb.insertAdjacentHTML('beforeend',frag);
    setInd(`${i.toLocaleString()} / ${N.toLocaleString()}`);
  }
  if(ui&&ui.onDone)ui.onDone();
  stop();
}

function mountVirtualRows(tbodySel,rows,makeRow,emptyHtml,opts){
  const tb=$(tbodySel),card=opts&&opts.card?$(opts.card):null,ind=opts&&opts.ind?$(opts.ind):null;
  if(!tb||!card)return;
  const token=++_virtualTok,colspan=opts.colspan||1,cache=opts.htmlCache||null;
  let frame=0;
  const setInd=t=>{if(ind)ind.textContent=t||'';};
  const remember=()=>{if(opts.cacheName&&opts.key&&opts.panel)rememberPanelCache(opts.cacheName,opts.key,opts.panel,opts.scrollSel);};
  const render=()=>{
    if(token!==_virtualTok)return;
    if(!rows.length){
      tb.innerHTML=emptyHtml;tb.dataset.virtualStart='0';tb.dataset.virtualRows='0';
      card.classList.remove('loading');setInd('');remember();return;
    }
    const visible=Math.min(VIRTUAL_MAX_DOM_ROWS,Math.max(24,Math.ceil(card.clientHeight/VIRTUAL_ROW_HEIGHT)+VIRTUAL_OVERSCAN*2));
    const start=Math.min(Math.max(0,rows.length-visible),Math.max(0,Math.floor(card.scrollTop/VIRTUAL_ROW_HEIGHT)-VIRTUAL_OVERSCAN));
    const end=Math.min(rows.length,start+visible);
    tb.innerHTML=virtualSpacerRow(start*VIRTUAL_ROW_HEIGHT,colspan)+virtualRowsHtml(rows,makeRow,start,end,cache)+virtualSpacerRow((rows.length-end)*VIRTUAL_ROW_HEIGHT,colspan);
    tb.dataset.virtualStart=String(start);
    tb.dataset.virtualRows=String(end-start);
    const virtualized=rows.length>end-start;
    card.classList.toggle('loading',virtualized);
    setInd(virtualized?`${(start+1).toLocaleString()}-${end.toLocaleString()} / ${rows.length.toLocaleString()}`:'');
    remember();
  };
  const onScroll=()=>{if(token!==_virtualTok)return;if(frame)return;frame=requestAnimationFrame(()=>{frame=0;render();});};
  card.addEventListener('scroll',onScroll,{passive:true});
  render();
  requestAnimationFrame(()=>{if(token===_virtualTok)render();});
}

function cmpCounts(){const b=S.compareBuckets||{};return {off:(b.off||[]).length,nohit:(b.nohit||[]).length,match:(b.match||[]).length};}
function compareSearchKey(r){return [r.equip,r.curParent,r.wcParent,r.curDep,r.wcDep].map(clean).join(' ').toLowerCase();}

function compareDiffMatch(r,diff){
  if(diff==='all')return true;

  return [...rows].sort((a,b)=>{

/* ---- tree rendering ---- */
function gutterHtml(prefixArr,isLast){

  h+=`<span class="g ${isLast?'g-l':'g-t'}"></span>`;return h;
}
function lblHtml(name,hl){
  if(!hl)return esc(name);
  const i=name.toLowerCase().indexOf(hl.toLowerCase());
  if(i<0)return esc(name);
  return esc(name.slice(0,i))+'<mark>'+esc(name.slice(i,i+hl.length))+'</mark>'+esc(name.slice(i+hl.length));
}
function rowInner(node,prefixArr,isLast,isRoot,hl){
  const kids=kidsOf(node),hasKids=kids.length>0;
  const dep=nodeDep(node);
  const depBadge=dep?`<span class="dep ${node.isLoad?'dep-load':''}" title="${node.isLoad?'Dependency · equipment above':'Dependency · Panel (From)'}">${ic('spline')}${esc(dep)}</span>`:'';

  const descTitle=node.isInstrument&&node.description?` title="${esc(node.description)}"`:'';
  const nk=clean(node.name).toLowerCase();
  const infoBtn=(S.depDetail.has(nk)||S.epDetail.has(nk)||node.pmdKey||node.pmdPanel)?`<button class="rowinfo" data-detail="${node.id}" title="Details" aria-label="Details for ${esc(node.name)}">${ic('info')}</button>`:'';
  if(isRoot){
    return `<div class="row root ${hasKids?'':'leafrow'}" data-id="${node.id}" ${hasKids?'data-exp="1"':''} tabindex="0" role="treeitem" aria-expanded="${hasKids?'false':''}">
      ${hasKids?`<span class="twist">${ic('chevron-right')}</span>`:'<span class="twist"></span>'}
      <span class="badge-root">${ic('zap')}</span>
      <span class="lbl"${descTitle}>${lblHtml(node.name,hl)}</span>
      ${depBadge}${pmdBadge}${hasKids?`<span class="cnt">${kids.length}</span>`:''}${infoBtn}</div>`;
  }
  const marker=hasKids?'<span class="marker branch"></span>':(node.isInstrument?`<span class="marker instrument">${ic('database')}</span>`:node.isLoad?`<span class="marker load">${ic('corner-down-right')}</span>`:node.isId?`<span class="marker leaf">${ic('tag')}</span>`:'<span class="marker dot"></span>');
  return `<div class="row ${hasKids?'':'leafrow'} ${node.isLoad?'is-load':''} ${node.isInstrument?'is-instrument':''} ${node.isSpare?'is-spare':''} ${node.isSpace?'is-space':''}" data-id="${node.id}" ${hasKids?'data-exp="1"':''} tabindex="0" role="treeitem" aria-expanded="${hasKids?'false':''}">
    <span class="gut">${gutterHtml(prefixArr,isLast)}</span>
    ${hasKids?`<span class="twist">${ic('chevron-right')}</span>`:'<span class="twist"></span>'}
    ${marker}<span class="lbl ${hasKids?'':'lbl-leaf'}"${descTitle}>${lblHtml(node.name,hl)}</span>
    ${depBadge}${pmdBadge}${hasKids?`<span class="cnt">${kids.length}</span>`:''}${infoBtn}</div>`;
}
function makeNode(node,prefixArr,isLast,isRoot){
  node._prefix=prefixArr;node._isLast=isLast;node._isRoot=isRoot;node._built=false;
  const wrap=document.createElement('div');wrap.className='node';

function wireTree(tree){

}
function renderTreeCollapsed(){

function childPrefix(node){return node._isRoot?[]:node._prefix.concat(!node._isLast);}
function expandNode(row,node){

function onTreeClick(e){
  const info=e.target.closest('.rowinfo');
  if(info){e.stopPropagation();openDetail(info.dataset.detail);return;}
  const row=e.target.closest('.row');if(!row)return;
  const node=S.nodeById.get(row.dataset.id);if(!node)return;
  if(!kidsOf(node).length){copyText(node.name);return;}
  if((e.metaKey||e.ctrlKey)){copyText(node.name);return;}
  toggleNode(row,node);
}
function onTreeKey(e){
  const row=e.target.closest('.row');if(!row)return;
  const node=S.nodeById.get(row.dataset.id);if(!node)return;
  const has=kidsOf(node).length>0;
  if(e.key==='Enter'||e.key===' '){e.preventDefault();if(has)toggleNode(row,node);else copyText(node.name);}
  else if(e.key==='ArrowRight'&&has&&!row.classList.contains('open'))expandNode(row,node);
  else if(e.key==='ArrowLeft'&&has&&row.classList.contains('open'))collapseNode(row);
}
let _expandTok=0,_expanding=false;
function expandBtnHTML(busy,info){
  return busy?`<span class="spin-ic">${ic('loader-circle')}</span>Stop${info?` <span class="ecount">${info}</span>`:''}`
    :`${ic('chevrons-down')}Expand all`;
}
function cancelExpand(){if(!_expanding)return;_expandTok++;_expanding=false;const b=$('#expandAll');if(b)b.innerHTML=expandBtnHTML(false);}
/* Expand the whole tree top-to-bottom (document order). Renders on a ~12ms/frame
   budget with no overlay, so the user can scroll and click while it fills in.
   Click the button again to stop. Any tree re-render (collapse, search, toggles)
   cancels it. */
async function expandAll(){
  if(S.search)return;
  if(_expanding){cancelExpand();return;}              // second click = stop
  const tree=$('#tree'),btn=$('#expandAll');
  const tok=++_expandTok;_expanding=true;
  if(btn)btn.innerHTML=expandBtnHTML(true,'');
  // pre-order stack: push roots reversed so the first (top) root is processed first
  const roots=S.roots.filter(r=>!nodeHidden(r)),stack=[];
  for(let i=roots.length-1;i>=0;i--){const row=tree.querySelector(`:scope > .node > .row[data-id="${roots[i].id}"]`);if(row)stack.push([roots[i],row]);}
  let done=0;const BUDGET=12;
  while(stack.length){
    const t0=performance.now();
    while(stack.length&&performance.now()-t0<BUDGET){
      const [node,row]=stack.pop();
      const vis=kidsOf(node);
      if(vis.length){
        if(!row.classList.contains('open'))expandNode(row,node);
        const kc=row.parentElement.querySelector(':scope > .kids').children; // child .node wrappers, in order
        for(let i=vis.length-1;i>=0;i--){const w=kc[i];if(w)stack.push([vis[i],w.firstElementChild]);} // reversed -> top-to-bottom
      }
      done++;
    }
    if(btn)btn.innerHTML=expandBtnHTML(true,done.toLocaleString());
    await raf();
    if(tok!==_expandTok)return;                        // superseded / cancelled
  }
  _expanding=false;if(btn)btn.innerHTML=expandBtnHTML(false);
}
function collapseAll(){
  cancelExpand();
  S.search='';const q=$('#q');if(q)q.value='';const qx=$('#qx');if(qx)qx.classList.remove('show');setQInfo('');
  renderTreeCollapsed();                               // bulk clear + rebuild roots (fast, no overlay)
}

/* ---- search (filtered render) ---- */
function computeFilter(q,idOnly){
  const ql=q.toLowerCase();
  const walk=n=>{let any=false;n.children.forEach(c=>{if(walk(c))any=true;});
    n._self=!nodeHidden(n)&&n.name.toLowerCase().includes(ql)&&(!idOnly||n.isId);
    n._show=n._self||any;return n._show;};
  S.roots.forEach(walk);
}
function countSelf(){let c=0;const w=n=>{if(n._self)c++;n.children.forEach(w);};S.roots.forEach(w);return c;}
function runSearch(){
  cancelExpand();
  const q=S.search.trim();
  if(!q){renderTreeCollapsed();setQInfo('');return;}
  computeFilter(q,S.idOnly);
  const m=countSelf();
  renderFiltered(q);
  setQInfo(m?`<b>${m}</b> match${m!==1?'es':''}${S.idOnly?' in ID Names':''} for “${esc(q)}”`:`No matches for “${esc(q)}”${S.idOnly?' in ID Names':''}`);
}
function renderFiltered(hl){
  const tree=$('#tree');tree.innerHTML='';
  const build=(node,prefixArr,isLast,isRoot)=>{
    const fullKids=kidsOf(node),shown=fullKids.filter(c=>c._show&&!nodeHidden(c));
    const showContext=node._self||shown.some(c=>c._self);
    const visible=showContext?fullKids:shown;
    node._prefix=prefixArr;node._isLast=isLast;node._isRoot=isRoot;node._built=true;
    const wrap=document.createElement('div');wrap.className='node';
    wrap.innerHTML=rowInner(node,prefixArr,isLast,isRoot,node._self?hl:'')+'<div class="kids"></div>';
    const kids=wrap.querySelector('.kids');
    const cp=isRoot?[]:prefixArr.concat(!isLast);
    visible.forEach((c,i)=>{
      const childLast=i===visible.length-1;
      if(c._show)kids.appendChild(build(c,cp,childLast,false));
      else{const extra=makeNode(c,cp,childLast,false);extra.classList.add('search-extra');kids.appendChild(extra);}
    });
    if(visible.length){const r=wrap.querySelector('.row');r.classList.add('open');r.setAttribute('aria-expanded','true');}
    return wrap;
  };
  const roots=S.roots.filter(r=>r._show&&!nodeHidden(r));
  const frag=document.createDocumentFragment();
  roots.forEach((r,i)=>frag.appendChild(build(r,[],i===roots.length-1,true)));
  tree.appendChild(frag);
  tree.classList.toggle('hide-deps',!S.showDeps);
  tree.classList.toggle('hide-pmd',!S.showPmdMatches);
  if(!roots.length)tree.innerHTML=`<div class="note info" style="margin:6px">${ic('search')}<div>Nothing matched. Try a different tag, or turn off <b>ID Names only</b>.</div></div>`;
}
